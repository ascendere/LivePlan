<app-header></app-header>

<div class="layout" [class.sidebar-collapsed]="isSidebarCollapsed">
  <app-sidebar [planId]="planId" (onCollapsedChange)="handleSidebarCollapse($event)"></app-sidebar>

  
  <main class="main-content">
    <div class="content-container">
      <h1>Inversiones</h1>

      <!-- Loading state -->
      <div *ngIf="isLoading" class="loading-state">
        <p>Cargando inversiones...</p>
      </div>

      <!-- Contenido principal -->
      <div class="content-section" *ngIf="!isLoading">
        <div class="container-padre">
          <div class="container">
            <table class="table">
              <thead>
                <tr class="table-header-row">
                  <th class="col-1">Inversiones iniciales</th>
                  <th class="col-2">Importe</th>
                  <th class="col-3"></th>
                </tr>
              </thead>
              <tbody>
                <!-- Iterar por cada tipo de inversión (Activos Fijos, Gastos Preoperativos, Capital de Trabajo) -->
                <ng-container *ngFor="let tipo of tiposInversion">
                  <!-- Header del tipo -->
                  <tr class="section-header">
                    <td colspan="3">
                      <div class="header-container">
                        <strong>{{ tipo.tipo }}</strong>
                        <button (click)="agregarInversionGeneral(tipo)" class="agg-btn-header">
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                          </svg>
                          Agregar nueva sección
                        </button>
                      </div>
                    </td>
                  </tr>

                  <!-- Iterar por cada inversión general (sección) de este tipo -->
                  <ng-container *ngFor="let inversion of tipo.inversiones; let i = index">
                    <!-- Header de la inversión general (sección) -->
                    <tr class="header-seccion" [class.nueva-fila]="!inversion.id">
                      <td>
                        <input
                          [(ngModel)]="inversion.seccion"
                          (blur)="!inversion.id && inversion.seccion ? guardarNuevaInversionGeneral(inversion, tipo) : null"
                          placeholder="Ingrese nombre de la sección"
                          class="form-control"
                        />
                      </td>
                      <td>
                        <input
                          [value]="recalcularImporteInversion(inversion) | number:'1.2-2'"
                          class="form-control"
                          [readonly]="true"
                        />
                      </td>
                      <td class="celda-delete">
                        <button
                          (click)="eliminarInversionGeneral(tipo, i)"
                          class="delete-btn"
                          title="Eliminar sección"
                        >
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                          </svg>
                        </button>
                      </td>
                    </tr>

                    <!-- Iterar por cada detalle de esta inversión general -->
                    <tr
                      *ngFor="let detalle of inversion.detalles; let j = index"
                      class="header-elemento"
                      [class.nueva-fila]="!detalle.id"
                    >
                      <td>
                        <input
                          [(ngModel)]="detalle.elemento"
                          (blur)="!detalle.id && detalle.elemento ? guardarNuevoDetalle(detalle, inversion) : null"
                          placeholder="Ingrese nombre del elemento"
                          class="form-control"
                        />
                      </td>
                      <td>
                        <input
                          type="number"
                          [(ngModel)]="detalle.importe"
                          (ngModelChange)="onDetalleImporteChange(detalle)"
                          placeholder="0.00"
                          class="form-control"
                          min="0"
                          step="0.01"
                        />
                      </td>
                      <td class="celda-delete">
                        <button
                          (click)="eliminarDetalle(inversion, j)"
                          class="delete-btn"
                          title="Eliminar elemento"
                        >
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                          </svg>
                        </button>
                      </td>
                    </tr>

                    <!-- Botón para agregar nuevo detalle -->
                    <tr>
                      <td colspan="3" class="celda-btn">
                        <button (click)="agregarDetalle(inversion)" class="agg-btn">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                          </svg>
                          <span class="btn-text">Agregar elemento nuevo</span>
                        </button>
                      </td>
                    </tr>
                  </ng-container>
                </ng-container>

                <!-- Botón guardar al final de la tabla -->
                <tr *ngIf="hayDetallesModificados()" class="fila-guardar-final">
                  <td colspan="3">
                    <button (click)="guardarTodasLasInversiones()" class="btn-guardar-final">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                      </svg>
                      Guardar Cambios ({{ detallesModificados.size }})
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
