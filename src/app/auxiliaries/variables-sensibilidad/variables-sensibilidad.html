<!-- Botón flotante para abrir el modal -->
<button class="floating-btn" (click)="toggleModal()" title="Configurar Variables de Sensibilidad">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="3"></circle>
    <path d="M12 1v6m0 6v6m5.5-11.5l-4.2 4.2m-2.6 2.6l-4.2 4.2M23 12h-6m-6 0H1m11.5 5.5l-4.2-4.2m-2.6-2.6l-4.2-4.2"></path>
  </svg>
</button>

<!-- Modal flotante -->
<div class="modal-overlay" *ngIf="isOpen" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Variables de Sensibilidad</h3>
      <button class="close-btn" (click)="closeModal()" title="Cerrar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <p class="info-text">Configuración global que afecta los cálculos del sistema</p>
      
      <form class="data-form">
        <div class="form-field">
          <label for="modal-cantidadVol">Cantidad Volumen *</label>
          <input
            type="number"
            id="modal-cantidadVol"
            [(ngModel)]="variablesSensibilidad.cantidad_volumen"
            name="cantidadVol"
            min="0"
            step="10"
            placeholder="0"
          />
        </div>
        
        <div class="form-field">
          <label for="modal-precio">Precio *</label>
          <input
            type="number"
            id="modal-precio"
            [(ngModel)]="variablesSensibilidad.precio"
            name="precio"
            min="0"
            step="1"
            placeholder="0"
          />
        </div>
        
        <div class="form-field">
          <label for="modal-costo">Costo *</label>
          <input
            type="number"
            id="modal-costo"
            [(ngModel)]="variablesSensibilidad.costo"
            name="costo"
            min="0"
            step="1"
            placeholder="0"
          />
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn-secondary" (click)="closeModal()" [disabled]="guardando">
        Cancelar
      </button>
      <button type="button" class="btn-primary" (click)="guardarVariablesSensibilidad()" [disabled]="guardando">
        <svg *ngIf="!guardando" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
        <svg *ngIf="guardando" class="spinner-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
        </svg>
        {{ guardando ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>

    <!-- Mensaje de estado -->
    <div *ngIf="mensajeGuardado" class="mensaje-estado" [class.error]="mensajeGuardado.includes('Error')">
      <svg *ngIf="!mensajeGuardado.includes('Error')" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <svg *ngIf="mensajeGuardado.includes('Error')" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
      {{ mensajeGuardado }}
    </div>
  </div>
</div>
